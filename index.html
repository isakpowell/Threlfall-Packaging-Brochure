    /* ─── RESET + TOKENS ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Chrome annotation / auto-link kill switch */
    a, a:link, a:visited, a:-webkit-any-link { color: inherit !important; text-decoration: none !important; pointer-events: none; }
    .product-desc, .product-desc * { color: #555E6B !important; text-decoration: none !important; background: transparent !important; border: none !important; }

    :root {
      /* Brand */
      --navy:       #1E2E6E;
      --navy-mid:   #2B3D8F;
      --navy-light: #3F52A8;
      /* Page */
      --page:       #F2F4F9;
      --white:      #FFFFFF;
      /* Type */
      --ink:        #181818;
      --muted:      #717171;
      --rule:       #DDDBD8;
      /* Fonts */
      --f-head: 'Inter', system-ui, sans-serif;
      --f-body: 'Inter', system-ui, sans-serif;
      --f-mono: 'Roboto Mono', 'Courier New', monospace;
    }

    body {
      font-family: var(--f-body);
      font-size: 14px;
      background: #C8C7C5;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ─── TOOLBAR ────────────────────────────────────────── */
    .toolbar {
      position: fixed; inset: 0 0 auto 0; z-index: 9000;
      height: 52px;
      background: var(--navy);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.08), 0 4px 20px rgba(0,0,0,0.35);
    }
    .tb-left   { display: flex; align-items: center; gap: 12px; }
    .tb-logo   { height: 28px; }
    .tb-name   { font-family: var(--f-head); font-size: 14px; font-weight: 600;
                 color: rgba(255,255,255,0.7); letter-spacing: 0.06em; text-transform: title-case; }
    .tb-btn    {
      font-family: var(--f-head); font-weight: 700; font-size: 13px;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: transparent; color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
      padding: 7px 20px; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ─── CATALOG SHELL ─────────────────────────────────── */
    .catalog {
      padding: 68px 0 48px;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }

    /* ─── ZOOM ───────────────────────────────────────────── */
    .page-wrap {
      transform-origin: top center;
    }

    /* ─── A4 PAGE ────────────────────────────────────────── */
    .page {
      width:  210mm;
      height: 297mm;
      background: var(--page);
      box-shadow: 0 4px 32px rgba(0,0,0,0.2), 0 1px 0 rgba(255,255,255,0.15);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      flex-shrink: 0;
      scroll-margin-top: 60px;
    }

    /* ═══════════════════════════════════════════════════════
       COVER
    ═══════════════════════════════════════════════════════ */
    .cover { background: var(--white); }

    .cv-top-band {
      height: 9mm;
      background: var(--navy);
      display: flex; align-items: center;
      padding: 0 14mm;
      flex-shrink: 0;
    }
    .cv-top-band img { height: 20px; }

    .cv-body { flex: 1; display: flex; overflow: hidden; }

    .cv-left {
      flex: 1;
      padding: 11mm 10mm 0 14mm;
      display: flex; flex-direction: column;
      border-right: 0.5px solid var(--rule);
    }

    .cv-rule {
      width: 14mm; height: 3px;
      background: var(--navy);
      border-radius: 2px;
      margin-bottom: 7mm;
    }

    .cv-title {
      font-family: var(--f-head);
      font-size: 38pt; font-weight: 900;
      line-height: 0.95; letter-spacing: -0.03em;
      color: var(--navy); text-transform: uppercase;
      margin-bottom: 4mm;
    }

    .cv-range {
      font-family: var(--f-head);
      font-size: 11pt; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8mm;
    }

    .cv-blurb {
      font-size: 8pt; line-height: 1.75;
      color: var(--muted); max-width: 76mm; margin-bottom: 9mm;
    }

    .cv-index { display: flex; flex-direction: column; gap: 2.2mm; }
    .cv-index-row {
      display: flex; align-items: center; gap: 3mm;
      font-family: var(--f-body); font-size: 7pt; color: var(--muted);
    }
    .cv-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }

    .cv-right {
      width: 82mm; flex-shrink: 0;
      background: #F0EEE9;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(4, 1fr);
      gap: 1.5mm; padding: 1.5mm;
    }

    .cv-tile {
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; padding: 4mm;
    }
    .cv-tile img { width: 100%; height: 100%; object-fit: contain; }
    .cv-tile--wide { grid-column: span 2; padding: 3mm 8mm; }

    .cv-footer {
      height: 12mm; background: var(--navy);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14mm; flex-shrink: 0;
    }
    .cv-footer-l {
      font-family: var(--f-head); font-size: 8pt; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }
    .cv-footer-r { font-size: 7.5pt; color: rgba(255,255,255,0.45); letter-spacing: 0.05em; }


    /* ═══════════════════════════════════════════════════════
       CATEGORY PAGE
    ═══════════════════════════════════════════════════════ */

    /* Page header — navy bar */
    .page-header {
      background: #263681;
      padding: 20px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-family: 'ITCAvantGardePro-Demi', sans-serif;
      font-size: 28px;
      font-weight: normal;
      color: #FFFFFF;
      line-height: 1.1;
    }

    .header-subtitle {
      font-family: 'ITCAvantGardePro-Bk', sans-serif;
      font-size: 18px;
      font-weight: normal;
      color: #FFFFFF;
      margin-top: 6px;
      line-height: 1.3;
    }

    .header-logos {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .header-logos img {
      height: 42px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    /* Product list container */
    .pg-grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Product row */
    .product-row {
      display: flex;
      align-items: flex-start;
      padding: 36px 18px;
      border-bottom: 1px solid #D5D3D0;
      gap: 24px;
    }

    .product-row:last-child {
      border-bottom: none;
    }

    .product-img-wrap {

function esc(s) {
  return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;');
}

function imgHtml(src, name, color) {
  const phSvg = `<div class="product-ph"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1"><rect x="3" y="2" width="14" height="20" rx="2"/><path d="M7 2v4h6V2M10 12v4M8 14h4"/></svg></div>`;
  if (!src) return phSvg;
  const phFallback = `this.parentElement.innerHTML='${phSvg.replace(/'/g,"\\'")}';`;
  return `<img src="${esc(src)}" alt="${esc(name)}" onerror="${esc(phFallback)}">`;
}

function buildContentsPage(entries) {
  const rows = entries.map(({cat, pageNum}) => {
    const meta = CAT[cat] || { c: '#4a5568' };
    const id = slugCat(cat);
    return `
    <a class="toc-row" href="#${id}" onclick="(function(e){e.preventDefault();var t=document.getElementById('${id}');if(t){window.scrollTo({top:t.getBoundingClientRect().top+window.scrollY-60,behavior:'smooth'});}}).call(this,event)">
      <div class="toc-swatch" style="background:${meta.c};"></div>
      <div class="toc-name">${cat}</div>
      <div class="toc-dots"></div>
      <div class="toc-num">${pageNum}</div>
    </a>`;
  }).join('');

  return `
<div class="page toc-wrap">
  <div class="toc-heading">Contents</div>
  <div class="toc-list">${rows}
  </div>
</div>`;
}

═══════════════════════════════════════════════════════════ */
function buildCard(p, color) {
  const sizes = p.sizes.map(s =>
    `<span class="size-pill">${s}</span>`
  ).join('');

  const specs = (p.specs && p.specs.length) ? p.specs : [
    { icon: 'dilution', value: '1:0 Dilution' },
    { icon: 'ph',       value: 'pH 10' },
    { icon: 'use',      value: 'General Purpose' },
  ];
  const TAG_LABELS = { 'food-safe':'Food Safe', 'concentrate':'Concentrate', 'rtu':'Ready To Use', 'industrial':'Industrial', 'commercial':'Commercial', 'tga-listed':'TGA Listed' };
  const rawTags = (p.tags && p.tags.length) ? p.tags : ['concentrate','commercial'];
  const tags = rawTags.map(t => typeof t === 'string' ? { type: t, label: TAG_LABELS[t] || t } : t);

  const specsHtml = `
    <div class="product-specs">
      ${specs.map(s => `
      <div class="spec-item">
        ${SPEC_ICONS[s.icon] || SPEC_ICONS.use}
        <span>${s.value}</span>
      </div>`).join('')}
    </div>`;

  const tagsHtml = `
    <div class="product-tags">
      ${tags.map(t => `<span class="product-tag tag-${t.type}">${t.label}</span>`).join('')}
    </div>`;

  return `
<div class="product-row">
  <div class="product-img-wrap">
    ${imgHtml(p.img, p.name, color)}
  </div>
  <div class="product-info">
    <div class="product-name-row">
      <span class="product-title">${p.name}</span>
      <span class="product-code">${p.sku}</span>
    </div>
    <p class="product-desc" translate="no" spellcheck="false">${p.desc}</p>
    ${specsHtml}
    ${tagsHtml}
    <div class="size-pills">
      ${sizes}
    </div>
  </div>
</div>`;
}

/* ═══════════════════════════════════════════════════════════
   CATEGORY SPLASH PAGE
═══════════════════════════════════════════════════════════ */
function slugCat(name) {
  return 'cat-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
}

function buildCatSplash(catName) {
  const meta  = CAT[catName] || { c:"#222", t:"" };
  const color = meta.c;
  // Title: break long names onto two lines at "&" or "/"
  const titleHtml = catName.replace(' & ', ' &amp;<br>').replace(' / ', ' /<br>');
  return `
<div class="page" id="${slugCat(catName)}" style="background:#1a1a1a; position:relative; overflow:hidden;">
  <div class="cat-splash-bg" style="background-image:${meta.img ? `url('${meta.img}')` : 'none'}; background-color:#1a1a1a;">
  </div>
  <div class="cat-splash-bg" style="position:absolute; inset:0; background:${color}cc; pointer-events:none;"></div>
  <div class="cat-splash-content">
    <h1 class="cat-splash-title">${titleHtml}</h1>
    <p class="cat-splash-subtitle">${meta.t}</p>
  </div>
  <img class="cat-splash-logo" src="brand_assets/AdvanceFaviconWhite.png" alt="Advance Chemicals" onerror="this.style.display='none'">
</div>`;
}

  const PER   = 3;
  const pages = [ buildCatSplash(catName) ];

  for (let i = 0, n = 1; i < products.length; i += PER, n++) {
    const slice = products.slice(i, i + PER);
    const cards = slice.map(p => buildCard(p, color)).join('');
    const pgNum = startPageNum + Math.floor(i / PER);

    pages.push(`
<div class="page" style="background:#FFFFFF;">
  <header class="page-header">
    <div>
      <div class="header-title">${catName}</div>
      <div class="header-subtitle">${meta.t}</div>
    </div>
    <div class="header-logos">
      <img src="brand_assets/Australian%20Made%20%26%20Owned%20-%20White%20LOGO.png" alt="Australian Made &amp; Owned" onerror="this.style.display='none'">

    </div>
  </header>
  <div class="pg-grid">${cards}</div>
  <div class="pg-foot">
    <span class="pg-foot-web">advancechemicals.com.au</span>
    <span class="pg-foot-num">${pgNum}</span>
  </div>
</div>`);
  }
  return pages;
}

(function () {
  const catOrder = [...new Set(PRODUCTS.map(p => p.cat))];
  const grouped  = {};
  catOrder.forEach(c => { grouped[c] = []; });
  PRODUCTS.forEach(p => grouped[p.cat].push(p));

  let pageNum = 4;
  const catHtml = [];
  const catPageNums = [];

  catOrder.forEach(cat => {
    catPageNums.push({ cat, pageNum });
    const pages = buildCatPages(cat, grouped[cat], pageNum);
    catHtml.push(...pages);
    pageNum += pages.length;
  });

  document.getElementById('catalog').innerHTML = [
    buildCover(),
    buildBenefitsPage(),
    buildAboutPage(),
    buildContentsPage(catPageNums),
    ...catHtml,
    buildOutroPage(),
  ].join('\n');
})();
</script>

<script>
  // TOC smooth scroll with toolbar offset
  document.addEventListener('click', function(e) {
    const row = e.target.closest('a.toc-row');
    if (!row) return;
    e.preventDefault();
    const id = row.getAttribute('href').slice(1);
    const target = document.getElementById(id);
    if (!target) return;
    const top = target.getBoundingClientRect().top + window.scrollY - 60;
    window.scrollTo({ top, behavior: 'smooth' });
  });

  function stripAnnotations(root) {
    (root || document).querySelectorAll('a:not([href^="http"]):not([href^="#"])').forEach(a => {
      const span = document.createElement('span');
      span.style.cssText = 'color:#555E6B;text-decoration:none;';
      span.innerHTML = a.innerHTML;
      a.replaceWith(span);
    });
  }
  stripAnnotations();
  document.addEventListener('DOMContentLoaded', () => stripAnnotations());
  const obs = new MutationObserver(muts =>
    muts.forEach(m => m.addedNodes.forEach(n => {
      if (n.nodeType === 1) stripAnnotations(n.tagName === 'A' ? n.parentElement : n);
    }))
  );
  document.addEventListener('DOMContentLoaded', () =>
    obs.observe(document.body, { subtree: true, childList: true })
  );
</script>
