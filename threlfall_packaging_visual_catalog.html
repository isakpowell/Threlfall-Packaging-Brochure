
<style>
* { box-sizing: border-box; }
.cat-btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--color-text-primary); white-space: nowrap; }
.cat-btn.active { background: #E6F1FB; color: #0C447C; border-color: #85B7EB; }
.cat-btn:hover:not(.active) { border-color: var(--color-border-secondary); }
.prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.prod-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; display: flex; flex-direction: column; }
.prod-img { width: 100%; aspect-ratio: 1; object-fit: contain; background: var(--color-background-secondary); padding: 12px; }
.prod-img-placeholder { width: 100%; aspect-ratio: 1; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; }
.prod-body { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
.prod-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); line-height: 1.3; }
.prod-desc { font-size: 11px; color: var(--color-text-secondary); line-height: 1.45; flex: 1; }
.prod-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.sku-tag { font-size: 10px; font-family: var(--font-mono); background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; padding: 2px 5px; }
.size-tag { font-size: 10px; background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; padding: 2px 5px; }
.cat-header { margin-bottom: 10px; padding-left: 2px; }
.cat-title { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
.cat-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; line-height: 1.4; }
.search-bar { font-size: 13px; max-width: 280px; }
.no-img-box { width: 100%; aspect-ratio: 1; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; }
.no-img-icon { width: 36px; height: 36px; opacity: 0.18; }
</style>

<div style="padding: 1rem 0 0;">
  <div style="margin-bottom: 12px;">

  </div>
  <div style="display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem;" id="cat-filters"></div>

  { name: "Apple Detergent", sku: "LN41A", cat: "Detergents & Laundry", sizes: ["5LT","20LT"], img: "https://advancechemicals.com.au/wp-content/uploads/2013/11/Apple-Detergent-5L.png", desc: "Medium duty dishwashing liquid and general purpose detergent. Can also be used as a soak for dishes." },
  { name: "Super Detergent", sku: "LN41", cat: "Detergents & Laundry", sizes: ["5LT","25LT"], img: BASE+"2025/10/Super-Detergent-510x510.jpg", desc: "Lemon scented manual dishwashing detergent. Concentrated surfactants cut through grease and food soils without irritating skin." },
  { name: "Liquid Laundry", sku: "LB454", cat: "Detergents & Laundry", sizes: ["25LT"], img: null, desc: "Premium quality liquid laundry detergent that cleans in hot or cold water, suitable for front and top loading machines." },

  { name: "Adsan LN1736", sku: "LN1736", cat: "Sanitisers & Disinfectants", sizes: ["5LT","25LT"], img: BASE+"2025/10/ADSAN-1736-2-510x510.jpg", desc: "Non-rinse sanitiser for food contact surfaces including cutlery, chopping boards and dishware. Ready to use with added detergent." },
  { name: "Adsan LN1856", sku: "LN1856", cat: "Sanitisers & Disinfectants", sizes: ["5LT","25LT"], img: BASE+"2020/05/ADSAN-1856-5L-Photo-510x510.png", desc: "Hospital grade disinfectant and sanitiser. Ready to use on porous and non-porous surfaces. TGA listed, kills COVID-19." },
  { name: "Adsan LN878", sku: "LN878", cat: "Sanitisers & Disinfectants", sizes: ["5LT"], img: null, desc: "Concentrated quaternary-ammonium based sanitiser (10% active) for food contact surfaces. Requires dilution before use." },

  { name: "Lemint", sku: "LN22", cat: "Floor & Surface Care", sizes: ["5LT","25LT"], img: BASE+"2022/09/05c63fe2-bca6-4c62-97a3-ef778efc502a-510x510.png", desc: "Quaternary ammonium based disinfectant with lemon scent. Powerful re-odouriser and general-purpose cleaner for commercial and industrial use." },

  { name: "Pink Pearl", sku: "LN772", cat: "Hand & Body Care", sizes: ["5LT","25LT"], img: null, desc: "Gentle liquid hand soap with lotionised conditioner. Neutral pH and skin conditioners leave hands feeling soft and supple." },
  { name: "Pink Pearl Foam", sku: "LN1556", cat: "Hand & Body Care", sizes: ["4x800ML CTN"], img: null, desc: "Foaming hand soap in 800ml pouches for wall-mounted dispensers. Gentle formula for high-frequency hand washing environments." },

  { name: "Industrial Methylated Spirits", sku: "IMS", cat: "Hand & Body Care", sizes: ["BOT"], img: null, desc: "Industrial methylated spirits for general purpose cleaning, disinfection and solvent applications." },

  { name: "Rinse Aid", sku: "LA102", cat: "Rinse Aid & Dishwashing", sizes: ["5LT","20LT"], img: BASE+"2013/11/Rinse-Aid-LN102-510x510.jpg", desc: "Machine dishwasher rinse additive. Reduces drying time and eliminates spotting on dishes, cutlery and glassware." },
  { name: "Sundance", sku: "LN36", cat: "Rinse Aid & Dishwashing", sizes: ["5LT"], img: BASE+"2025/10/SUNDANCE-LN36-5L-510x510.jpg", desc: "Cream liquid hard surface abrasive cleaner. Removes oil, grease and soil from glass, metal and enamel with a polishing action." },

  { name: "Room Deodoriser", sku: "LN301", cat: "Air Care & Deodorising", sizes: ["5LT"], img: BASE+"2022/09/ROOM-DEODORISER-min-1-510x680.png", desc: "Absorbs unpleasant and musty smells with odour-neutralising compounds. Use neat via hand sprayer on rooms, carpets and fabric." },
  { name: "Fresha Deotabs (Spruce)", sku: "PO797", cat: "Air Care & Deodorising", sizes: ["EA"], img: null, desc: "Toilet and urinal deodorant tabs in spruce fragrance. Long-lasting odour control for bathroom and washroom areas." },
];

const catMeta = {
  "Degreasers & Cleaners":      { color: "#185FA5", sub: "Powerful formulas for cutting through grease, grime and industrial soils" },
  "Detergents & Laundry":       { color: "#3B6D11", sub: "Everyday washing solutions for fabrics, dishes and general cleaning" },
  "Sanitisers & Disinfectants": { color: "#993C1D", sub: "Hospital-grade sanitising products that kill bacteria and viruses" },
  "Floor & Surface Care":       { color: "#534AB7", sub: "Concentrated cleaners to maintain and deodorise floors and hard surfaces" },
  "Glass & Window Cleaning":    { color: "#0F6E56", sub: "Streak-free formulas for glass, mirrors and windows" },
  "Hand & Body Care":           { color: "#993556", sub: "Soaps, washes and foams for personal hygiene in workplace environments" },
  "Rinse Aid & Dishwashing":    { color: "#854F0B", sub: "Spotless rinse aids and dishwashing solutions for commercial kitchens" },
  "Air Care & Deodorising":     { color: "#5F5E5A", sub: "Odour-neutralising products that keep facilities smelling fresh" },
};

const cats = [...new Set(products.map(p => p.cat))];
let activeCat = "All";

const filterEl = document.getElementById("cat-filters");
[{label:"All"}, ...cats.map(c=>({label:c}))].forEach(({label}) => {
  const b = document.createElement("button");
  b.className = "cat-btn" + (label === "All" ? " active" : "");
  b.textContent = label === "All" ? "All products" : label;
  b.onclick = () => { activeCat = label; document.querySelectorAll(".cat-btn").forEach(x => x.classList.toggle("active", x.textContent === b.textContent)); render(); };
  filterEl.appendChild(b);
});

function imgOrPlaceholder(src, name) {
  if (!src) return `<div class="no-img-box"><svg class="no-img-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>`;
  return `<img class="prod-img" src="${src}" alt="${name}" onerror="this.outerHTML='<div class=no-img-box><svg class=no-img-icon viewBox=\\'0 0 24 24\\' fill=none stroke=currentColor stroke-width=1.5><rect x=3 y=3 width=18 height=18 rx=2/><circle cx=8.5 cy=8.5 r=1.5/><path d=\\'M21 15l-5-5L5 21\\'/></svg></div>'" />`;
}

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const grouped = {};
  products.forEach(p => {
    const matchCat = activeCat === "All" || p.cat === activeCat;
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
    if (matchCat && matchQ) {
      if (!grouped[p.cat]) grouped[p.cat] = [];
      grouped[p.cat].push(p);
    }
  });

  let html = "";
  const total = Object.values(grouped).reduce((s,a) => s+a.length, 0);
  if (total === 0) { html = `<p style="color:var(--color-text-secondary);font-size:14px;padding:1rem 0;">No products match your search.</p>`; }
  else {
    Object.entries(grouped).forEach(([cat, items]) => {
      const m = catMeta[cat] || { color: "#444", sub: "" };
      html += `<div style="margin-bottom:2rem;">
        <div class="cat-header">
          <div class="cat-title" style="color:${m.color};">${cat}</div>
          <div class="cat-sub">${m.sub}</div>
        </div>
        <div class="prod-grid">`;
      items.forEach(p => {
        html += `<div class="prod-card">
          ${imgOrPlaceholder(p.img, p.name)}
          <div class="prod-body">
            <div class="prod-name">${p.name}</div>
            <div class="prod-desc">${p.desc}</div>
            <div class="prod-meta">
              <span class="sku-tag">${p.sku}</span>
              ${p.sizes.map(s=>`<span class="size-tag">${s}</span>`).join("")}
            </div>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });
  }
  document.getElementById("catalog").innerHTML = html;
}
render();
</script>
