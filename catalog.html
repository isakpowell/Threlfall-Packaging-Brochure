<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no">
  <title>Advance Chemicals — Threlfall Packaging 2025</title>

  <!-- Inter (all weights) + Roboto Mono (SKU codes) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ─── RESET + TOKENS ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Chrome annotation / auto-link kill switch */
    a, a:link, a:visited, a:-webkit-any-link { color: inherit !important; text-decoration: none !important; pointer-events: none; }
    .card-desc, .card-desc * { color: #555E6B !important; text-decoration: none !important; }

    :root {
      /* Brand */
      --navy:       #1E2E6E;
      --navy-mid:   #2B3D8F;
      --navy-light: #3F52A8;
      /* Page */
      --page:       #F2F4F9;
      --white:      #FFFFFF;
      --card:       #FFFFFF;
      /* Type */
      --ink:        #181818;
      --ink-2:      #3E3E3E;
      --muted:      #717171;
      --subtle:     #A8A8A8;
      /* Rules */
      --rule:       #DDDBD8;
      --rule-light: #EDECE9;
      /* Fonts */
      --f-head: 'Inter', system-ui, sans-serif;
      --f-body: 'Inter', system-ui, sans-serif;
      --f-mono: 'Roboto Mono', 'Courier New', monospace;
    }

    body {
      font-family: var(--f-body);
      background: #C8C7C5;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ─── TOOLBAR ────────────────────────────────────────── */
    .toolbar {
      position: fixed; inset: 0 0 auto 0; z-index: 9000;
      height: 52px;
      background: var(--navy);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.08), 0 4px 20px rgba(0,0,0,0.35);
    }
    .tb-left   { display: flex; align-items: center; gap: 12px; }
    .tb-logo   { height: 28px; }
    .tb-name   { font-family: var(--f-head); font-size: 14px; font-weight: 600;
                 color: rgba(255,255,255,0.7); letter-spacing: 0.06em; text-transform: uppercase; }
    .tb-btn    {
      font-family: var(--f-head); font-weight: 700; font-size: 13px;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: transparent; color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
      padding: 7px 20px; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ─── CATALOG SHELL ─────────────────────────────────── */
    .catalog {
      padding: 68px 0 48px;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }

    /* ─── A4 PAGE ────────────────────────────────────────── */
    /* All page layout is in mm so print = screen at 96dpi */
    .page {
      width:  210mm;
      height: 297mm;
      background: var(--page);
      box-shadow: 0 4px 32px rgba(0,0,0,0.2), 0 1px 0 rgba(255,255,255,0.15);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════════
       COVER
    ═══════════════════════════════════════════════════════ */
    .cover {
      background: var(--white);
    }

    /* Thin top rule in navy */
    .cv-top-band {
      height: 9mm;
      background: var(--navy);
      display: flex; align-items: center;
      padding: 0 14mm;
      flex-shrink: 0;
    }
    .cv-top-band img { height: 20px; }

    /* Two-column body */
    .cv-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Cover LEFT column ── */
    .cv-left {
      flex: 1;
      padding: 11mm 10mm 0 14mm;
      display: flex; flex-direction: column;
      border-right: 0.5px solid var(--rule);
    }

    .cv-rule {
      width: 14mm; height: 3px;
      background: var(--navy);
      border-radius: 2px;
      margin-bottom: 7mm;
    }

    .cv-title {
      font-family: var(--f-head);
      font-size: 38pt;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--navy);
      text-transform: uppercase;
      margin-bottom: 4mm;
    }

    .cv-range {
      font-family: var(--f-head);
      font-size: 11pt;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8mm;
    }

    .cv-blurb {
      font-size: 8pt;
      line-height: 1.75;
      color: var(--muted);
      max-width: 76mm;
      margin-bottom: 9mm;
    }

    /* Category index */
    .cv-index { display: flex; flex-direction: column; gap: 2.2mm; }
    .cv-index-row {
      display: flex; align-items: center; gap: 3mm;
      font-family: var(--f-body); font-size: 7pt; color: var(--muted);
    }
    .cv-dot {
      width: 7px; height: 7px; border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Cover RIGHT column ── */
    .cv-right {
      width: 82mm;
      flex-shrink: 0;
      background: #F0EEE9;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(4, 1fr);
      gap: 1.5mm;
      padding: 1.5mm;
    }

    .cv-tile {
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      padding: 4mm;
    }
    .cv-tile img {
      width: 100%; height: 100%;
      object-fit: contain;
    }
    /* Wide tile spans 2 columns */
    .cv-tile--wide { grid-column: span 2; padding: 3mm 8mm; }

    /* ── Cover footer ── */
    .cv-footer {
      height: 12mm;
      background: var(--navy);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14mm;
      flex-shrink: 0;
    }
    .cv-footer-l {
      font-family: var(--f-head); font-size: 8pt; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }
    .cv-footer-r {
      font-size: 7.5pt; color: rgba(255,255,255,0.45);
      letter-spacing: 0.05em;
    }


    /* ═══════════════════════════════════════════════════════
       CATEGORY PAGE
    ═══════════════════════════════════════════════════════ */

    /* Page header */
    .pg-head {
      flex-shrink: 0;
      padding: 6mm 12mm 5mm;
      border-bottom: 1px solid rgba(30, 46, 110, 0.12);
    }

    .pg-cat-name {
      font-family: var(--f-head);
      font-size: 38px;
      font-weight: 600;
      color: #1C2B6B;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 2.5mm;
    }

    .pg-tagline {
      font-family: var(--f-body);
      font-size: 15px;
      font-weight: 300;
      color: #3B6DB5;
      line-height: 1.35;
      letter-spacing: -0.01em;
      max-width: 140mm;
      margin-top: 2.5mm;
    }

    .pg-section {
      font-family: var(--f-head);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9CA3AF;
      margin-top: 2mm;
    }

    .pg-logo {
      height: 52px;
      width: 52px;
      flex-shrink: 0;
    }

    /* Product grid
       Math: 297 - ~40(head) - 10(foot) = 247mm
             grid padding 3mm t/b = 6mm → 241mm for cards
             3 cards + 2×3mm gaps = 3h + 6 = 241 → h ≈ 78mm → use 76mm */
    .pg-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 3mm;
      padding: 3mm 12mm;
      align-content: start;
      overflow: hidden;
    }

    /* Product card */
    .card {
      background: var(--card);
      border-radius: 8px;
      height: 76mm;
      display: flex;
      overflow: hidden;
    }

    /* Image zone */
    .card-img {
      width: 70mm;
      flex-shrink: 0;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      padding: 4mm;
      border-radius: 8px 0 0 8px;
    }
    .card-img img {
      max-width: 100%; max-height: 100%;
      width: 100%; height: 100%;
      object-fit: contain;
    }

    /* Placeholder when no image */
    .card-ph {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      opacity: 0.2;
    }

    /* Content panel */
    .card-body {
      flex: 1;
      display: flex; flex-direction: column;
      padding: 5mm 5.5mm 4.5mm;
      min-width: 0; overflow: hidden;
    }

    /* Name + SKU row */
    .card-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 3mm;
      margin-bottom: 3.5mm;
      flex-shrink: 0;
      padding-top: 1mm;
    }

    .card-name {
      font-family: var(--f-head);
      font-size: 16pt;
      font-weight: 700;
      color: #1A1A2E;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .card-sku {
      font-family: var(--f-head);
      font-size: 11pt;
      font-weight: 400;
      color: #9CA3AF;
      letter-spacing: 0.01em;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* Description */
    .card-desc {
      font-family: var(--f-body);
      font-size: 11pt;
      color: #555E6B;
      line-height: 1.6;
      overflow: hidden;
      transform: translateZ(0);
      isolation: isolate;
    }

    /* Size pills */
    .card-foot {
      display: flex;
      align-items: center;
      gap: 2mm;
      margin-top: auto;
      padding-top: 3mm;
      flex-shrink: 0;
    }

    .t-size {
      font-family: var(--f-body);
      font-size: 10pt;
      font-weight: 600;
      color: #fff;
      border-radius: 5px;
      padding: 4px 12px;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    /* Page footer */
    .pg-foot {
      height: 10mm;
      padding: 0 12mm;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      background: #263681;
    }
    .pg-foot-num { font-family: var(--f-head); font-size: 8pt; font-weight: 600;
                   color: rgba(255,255,255,0.7); letter-spacing: 0.08em; }
    .pg-foot-web { font-size: 8pt; font-weight: 400;
                   color: rgba(255,255,255,0.55); letter-spacing: 0.04em; }


    /* ═══════════════════════════════════════════════════════
       BACK PAGE
    ═══════════════════════════════════════════════════════ */
    .back-page { background: var(--navy); }

    .back-accent {
      height: 5mm;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .back-body {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16mm;
      text-align: center;
    }

    .back-logo { height: 52px; margin-bottom: 10mm; }

    .back-rule {
      width: 32mm; height: 1px;
      background: rgba(255,255,255,0.18);
      margin-bottom: 10mm;
    }

    .back-title {
      font-family: var(--f-head);
      font-size: 13pt; font-weight: 800;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: #fff; margin-bottom: 2mm;
    }

    .back-sub {
      font-family: var(--f-head);
      font-size: 8.5pt; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.5); margin-bottom: 12mm;
    }

    .back-contacts { display: flex; flex-direction: column; gap: 4.5mm; margin-bottom: 12mm; }
    .bc-row { display: flex; align-items: baseline; justify-content: center; gap: 8mm; }
    .bc-label {
      font-family: var(--f-head); font-size: 6.5pt; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.3); min-width: 20mm; text-align: right;
    }
    .bc-val {
      font-size: 9pt; font-weight: 500;
      color: rgba(255,255,255,0.8); min-width: 54mm; text-align: left;
    }

    .back-tagline {
      font-size: 7pt; color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    .back-foot {
      height: 11mm; flex-shrink: 0;
      border-top: 0.5px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
    }
    .back-foot span {
      font-size: 6.5pt; color: rgba(255,255,255,0.22);
      letter-spacing: 0.06em; text-transform: uppercase;
    }


    /* ═══════════════════════════════════════════════════════
       PRINT RESET
    ═══════════════════════════════════════════════════════ */
    @media print {
      body { background: none; }
      .toolbar { display: none !important; }
      .catalog { padding: 0; gap: 0; display: block; }
      .page {
        margin: 0; box-shadow: none;
        break-after: page;
        page-break-after: always;
      }
      @page { size: A4 portrait; margin: 0; }
      * { print-color-adjust: exact; -webkit-print-color-adjust: exact; color-adjust: exact; }
    }
  </style>
</head>

/* Escape a string for injection into an html attribute */
function esc(s) {
  return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;');
}

/* Product image or placeholder */
function imgHtml(src, name, color) {
  const phSvg = `<div class="card-ph"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1"><rect x="3" y="2" width="14" height="20" rx="2"/><path d="M7 2v4h6V2M10 12v4M8 14h4"/></svg></div>`;
  if (!src) return phSvg;
  // onerror rebuilds the placeholder without quotes
  const phFallback = `this.parentElement.innerHTML='${phSvg.replace(/'/g,"\\'")}';`;
  return `<img src="${esc(src)}" alt="${esc(name)}" onerror="${esc(phFallback)}">`;
}

/* ═══════════════════════════════════════════════════════════
   PRODUCT CARD  — full-width landscape (matching screenshot1)
═══════════════════════════════════════════════════════════ */
function buildCard(p, color) {
  const sizes = p.sizes.map(s =>
    `<span class="t-size" style="background:${color};">${s}</span>`
  ).join('');

  return `
<div class="card">
  <div class="card-img">${imgHtml(p.img, p.name, color)}</div>
  <div class="card-body">
    <div class="card-top">
      <span class="card-name">${p.name}</span>
      <span class="card-sku">${p.sku}</span>
    </div>
    <div class="card-desc" translate="no" spellcheck="false">${p.desc}</div>
    <div class="card-foot">
      ${sizes}
    </div>
  </div>
</div>`;
}

/* ═══════════════════════════════════════════════════════════
   CATEGORY PAGES  (3 products / page = 3 rows × 1 col)
═══════════════════════════════════════════════════════════ */
function buildCatPages(catName, products, startPageNum) {
  const meta  = CAT[catName] || { c:"#444", t:"" };
  const color = meta.c;
  const PER   = 3;
  const pages = [];

  for (let i = 0, n = 1; i < products.length; i += PER, n++) {
    const slice = products.slice(i, i + PER);
    // No ghost cards needed — single column always fills cleanly

    const cards = slice.map(p => buildCard(p, color)).join('');

    const totalSections = Math.ceil(products.length / PER);
    const sectionEl = totalSections > 1 ? `<div class="pg-section">Page ${n} of ${totalSections}</div>` : '';
    const pgNum = startPageNum + Math.floor(i / PER);

    pages.push(`
<div class="page">
  <div class="pg-head">
    <div style="display:flex; align-items:flex-start; justify-content:space-between;">
      <div>
        <div class="pg-cat-name">${catName}</div>
        <div class="pg-tagline">${meta.t}</div>
        ${sectionEl}
      </div>
      <img class="pg-logo" src="brand_assets/ADVfavicon.png" alt="Advance Chemicals" onerror="this.style.display='none'" style="margin-top:3mm;">
    </div>
  </div>
  <div class="pg-grid">${cards}</div>
  <div class="pg-foot">
    <span class="pg-foot-web">advancechemicals.com.au</span>
    <span class="pg-foot-num">${pgNum}</span>
  </div>
</div>`);
  }
  return pages;
}

/* ═══════════════════════════════════════════════════════════

(function () {
  // Group products by category in source order
  const catOrder = [...new Set(PRODUCTS.map(p => p.cat))];
  const grouped  = {};
  catOrder.forEach(c => { grouped[c] = []; });
  PRODUCTS.forEach(p => grouped[p.cat].push(p));

  // Build all pages
  let pageNum = 3;          // cover=1, slogan=2
  const catHtml = [];

  catOrder.forEach(cat => {
    const pages = buildCatPages(cat, grouped[cat], pageNum);
    catHtml.push(...pages);
    pageNum += pages.length;
  });

  document.getElementById('catalog').innerHTML = [
    buildCover(),
    buildSloganPage(),
    ...catHtml,
    buildQuotePage(pageNum),
    buildBack(),
  ].join('\n');
})();

<script>
  function stripAnnotations(root) {
    (root || document).querySelectorAll('a:not([href^="http"]):not([href^="#"])').forEach(a => {
      const span = document.createElement('span');
      span.style.cssText = 'color:#555E6B;text-decoration:none;';
      span.innerHTML = a.innerHTML;
      a.replaceWith(span);
    });
  }
  stripAnnotations();
  document.addEventListener('DOMContentLoaded', () => stripAnnotations());
  const obs = new MutationObserver(muts =>
    muts.forEach(m => m.addedNodes.forEach(n => {
      if (n.nodeType === 1) stripAnnotations(n.tagName === 'A' ? n.parentElement : n);
    }))
  );
  document.addEventListener('DOMContentLoaded', () =>
    obs.observe(document.body, { subtree: true, childList: true })
  );
</script>
